# nginx serves the built SPA and reverse-proxies the API to the backend container.
# `backend` is the docker-compose service name, resolved on the compose network.

server {
    listen 80;
    server_name _;

    # gzip text assets — cheap win for JS/CSS/JSON payloads.
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    root /usr/share/nginx/html;
    index index.html;

    # API reverse-proxy: same-origin /api/* is forwarded to the Spring Boot backend.
    # The trailing slash on both sides keeps the /api prefix intact (the backend maps /api/**).
    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Preserve the JWT and the correlation id across the proxy hop so backend
        # auth works and X-Request-Id logging stays stitched end-to-end.
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Request-Id  $http_x_request_id;
    }

    # SPA fallback: unknown paths are client-side routes (react-router), so serve index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
