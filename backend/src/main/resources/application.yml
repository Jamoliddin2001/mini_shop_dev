spring:
  application:
    name: mini-shop-backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/minishop}
    username: ${DB_USER:minishop}
    password: ${DB_PASSWORD:}

  jpa:
    # Schema is owned exclusively by Flyway. Hibernate only validates that the
    # entity mappings match the migrated schema — it never alters the database.
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    repair-on-migrate: true

  graphql:
    path: /graphql
    graphiql:
      enabled: false   # playground отключён в prod; включается в dev-профиле ниже
    schema:
      printer:
        enabled: false

  # Pagination defaults for all list endpoints. max-page-size caps client-supplied
  # ?size= so a single request cannot pull an unbounded result set.
  data:
    web:
      pageable:
        default-page-size: 20
        max-page-size: 100

# Security / JWT. Secret MUST be provided via env (no default) so the app fails fast
# instead of booting with a weak key. TTL defaults to 1 hour (access-token only; no refresh).
security:
  jwt:
    secret: ${JWT_SECRET}
    ttl: ${JWT_TTL:PT1H}

# CORS: explicit comma-separated whitelist of frontend origins (never "*").
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# Actuator: expose only health, info and metrics.
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true

# Baseline logging. Never log passwords/tokens/PII.
# The correlation pattern injects the per-request id (set by RequestIdFilter into the MDC) into
# Spring Boot's default console pattern, so every line is traceable to one request.
logging:
  pattern:
    correlation: "[%X{requestId:-}] "
  level:
    root: INFO
    com.shop: INFO

---
# Local development profile: verbose logging + SQL tracing.
spring:
  config:
    activate:
      on-profile: dev
  graphql:
    graphiql:
      enabled: true    # playground доступен на /graphiql в dev

management:
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.shop: DEBUG
    org.hibernate.SQL: DEBUG
    org.flywaydb: DEBUG
    org.springframework.graphql: DEBUG

---
# Production profile: stricter logging, no SQL noise.
spring:
  config:
    activate:
      on-profile: prod

# HSTS is only meaningful over HTTPS — enable it where the app is served via TLS (prod).
security:
  headers:
    hsts-enabled: true

logging:
  level:
    root: WARN
    com.shop: INFO
